{% extends "base.html" %}
{% block content %}
<header class="page-header"><h1>Monitoramentos</h1></header>
<section class="table-card">
    {% for directorate in directorates %}
        <a class="list-row" href="{{ directorate.get_absolute_url }}">{{ directorate.name }}</a>
    {% empty %}
        <p class="muted">Nenhum monitoramento cadastrado.</p>
    {% endfor %}
</section>
{% endblock %}
