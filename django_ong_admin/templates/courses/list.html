{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1>Cursos</h1>
    <a class="button" href="{% url 'course_create' %}">Novo curso</a>
</header>
<form class="search-form" method="get"><input name="q" placeholder="Buscar curso" value="{{ request.GET.q }}"></form>
<section class="table-card">
    {% for course in courses %}
        <a class="list-row" href="{{ course.get_absolute_url }}">{{ course.name }} <small>{{ course.available_seats }} vagas</small></a>
    {% empty %}
        <p class="muted">Nenhum curso cadastrado.</p>
    {% endfor %}
</section>
{% endblock %}
