{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1>{{ object.name }}</h1>
    <a class="button" href="{% url 'course_update' object.pk %}">Editar</a>
</header>
<section class="table-card">
    <p>{{ object.description }}</p>
    <p><strong>Vagas:</strong> {{ object.capacity }}</p>
    <p><strong>Disponiveis:</strong> {{ object.available_seats }}</p>
</section>
{% endblock %}
