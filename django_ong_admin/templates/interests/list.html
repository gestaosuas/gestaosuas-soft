{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1>Interesses</h1>
    <a class="button" href="{% url 'interest_create' %}">Novo interesse</a>
</header>
<section class="table-card">
    {% for interest in interests %}
        <div class="list-row">{{ interest.student }} <small>{{ interest.course }} - {{ interest.get_status_display }}</small></div>
    {% empty %}
        <p class="muted">Nenhum interesse registrado.</p>
    {% endfor %}
</section>
{% endblock %}
